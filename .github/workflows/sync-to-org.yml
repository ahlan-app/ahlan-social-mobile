name: Sync to Ahlan Org

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to ahlan-app/ahlan-social-mobile
        run: |
          git remote add org https://x-access-token:${{ secrets.ORG_SYNC_PAT }}@github.com/ahlan-app/ahlan-social-mobile.git
          git push org main --force
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Cleanup
        if: always()
        run: git remote remove org
