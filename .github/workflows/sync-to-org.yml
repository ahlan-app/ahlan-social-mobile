name: Sync to Ahlan Org

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORG_SYNC_PAT }}

      - name: Push to ahlan-app org
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.ORG_SYNC_PAT }}@github.com/ahlan-app/ahlan-social-mobile.git
          git push origin main --force
        env:
          GIT_TERMINAL_PROMPT: 0
