<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ahlan Social App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ahlan">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Dancing+Script:wght@700&family=Fredoka:wght@500&display=swap" rel="stylesheet">
    <style>
      :root {
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-right: env(safe-area-inset-right, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-left: env(safe-area-inset-left, 0px);
      }
      .safe-pt { padding-top: var(--safe-area-inset-top); }
      .safe-pb { padding-bottom: var(--safe-area-inset-bottom); }
      .safe-pl { padding-left: var(--safe-area-inset-left); }
      .safe-pr { padding-right: var(--safe-area-inset-right); }
      
      html, body, #root {
        height: 100%;
        overflow: hidden;
      }
      body {
        height: -webkit-fill-available;
        background-color: #000;
        color: #fff;
        /* Prevent text selection to feel more like a native app */
        -webkit-user-select: none; /* Safari */
        -moz-user-select: none;    /* Firefox */
        -ms-user-select: none;     /* IE/Edge */
        user-select: none;         /* Standard */
        -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
      }
      
      /* Re-enable text selection for form inputs */
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }

      #root {
        display: flex;
        flex-direction: column;
      }

      /* Critical CSS for Initial Paint */
      .app-shell {
        height: 100%;
        width: 100%;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        background-color: #fff;
      }
      .dark .app-shell { background-color: #000; }

      .app-header {
        background-color: #fff;
        border-bottom: 1px solid #e5e7eb;
        padding: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .dark .app-header { background-color: #000; border-color: #1f2937; }

      .app-main {
        flex: 1;
        overflow-x: hidden;
        position: relative;
        overflow-y: auto;
        padding-bottom: 5rem;
      }

      .app-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #fff;
        border-top: 1px solid #e5e7eb;
        z-index: 30;
        height: calc(4rem + var(--safe-area-inset-bottom));
      }
      .dark .app-nav { background-color: #000; border-color: #1f2937; }
      
      .loading-spinner-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .loading-spinner {
        animation: spin 1s linear infinite;
        border-radius: 9999px;
        height: 4rem;
        width: 4rem;
        border-top-width: 2px;
        border-bottom-width: 2px;
        border-color: #3b82f6;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      /* For custom scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; /* bg-slate-100 */
      }
      .dark ::-webkit-scrollbar-track {
        background: #1a202c; /* bg-gray-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; /* bg-slate-400 */
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #4a5568; /* bg-gray-600 */
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* bg-slate-500 */
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #718096; /* bg-gray-500 */
      }
      .font-handwriting {
        font-family: 'Dancing Script', cursive;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "date-fns": "https://aistudiocdn.com/date-fns@^3.6.0",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.75.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }).catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
